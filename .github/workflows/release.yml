name: Build Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  runtime-zip:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify release inputs
        run: |
          npm run check:public-release
          npm run check:bootstrap
          npm run check:runtime-package

      - name: Build trimmed runtime ZIP
        shell: powershell
        run: ./scripts/Build-JavaRockRelease.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: JavaRock-Windows
          path: dist/*.zip
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $zip = Get-ChildItem -LiteralPath dist -Filter '*.zip' | Select-Object -First 1
          if (-not $zip) { throw 'Release ZIP was not created.' }

          $previousErrorActionPreference = $ErrorActionPreference
          $ErrorActionPreference = 'SilentlyContinue'
          gh release view $env:GITHUB_REF_NAME *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = $previousErrorActionPreference

          if ($releaseExists) {
            gh release upload $env:GITHUB_REF_NAME $zip.FullName --clobber
          } else {
            gh release create $env:GITHUB_REF_NAME $zip.FullName --generate-notes --title "JavaRock $env:GITHUB_REF_NAME"
          }
